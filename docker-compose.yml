services:
  postgres:
    image: postgres:16-alpine
    container_name: agendaviva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendaviva
      POSTGRES_PASSWORD: agendaviva
      POSTGRES_DB: agendaviva
    ports:
      - "5432:5432"
    volumes:
      - agendaviva_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agendaviva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  agendaviva_pg:
